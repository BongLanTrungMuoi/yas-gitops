# value-dev.yaml
domain: "yas.local.com"
envTag: "dev"
namespace: "yas-dev"
infraNamespace: "yas-dev"
repoURL: "https://github.com/BongLanTrungMuoi/Project-02.git"
targetRevision: main # Usually points to a release branch/tag outside local dev

coreServices:
  - product
  - cart
  - order
  - customer
  - inventory
  - tax
  - media
  - search
  - sampledata

infra:
  postgresql:
    replicas: 1
    username: yasadminuser
    password: admin
  kafka:
    replicas: 1
  zookeeper:
    replicas: 1
  elasticsearch:
    replicas: 1
  redis:
    password: redis
    chartVersion: "20.6.1"
  akhq:
    chartVersion: "0.25.1"
  keycloak:
    bootstrapAdmin:
      username: admin
      password: admin

# Default image tags for dev
global:
  partOf: yas
  argocdNamespace: argocd
  project: default
  destinationServer: https://kubernetes.default.svc
  repoURL: https://github.com/BongLanTrungMuoi/Project-02.git
  targetRevision: main
  image:
    tag: "latest"

services:
  yas-configuration: { tag: "latest" }
  backoffice-bff: { tag: "latest" }
  backoffice-ui: { tag: "latest" }
  storefront-bff: { tag: "latest" }
  storefront-ui: { tag: "latest" }
  swagger-ui: { tag: "v5.32.6" }
  cart: { tag: "latest" }
  customer: { tag: "latest" }
  inventory: { tag: "latest" }
  media: { tag: "latest" }
  order: { tag: "latest" }
  payment: { tag: "latest" }
  product: { tag: "latest" }
  sampledata: { tag: "latest" }
  search: { tag: "latest" }
  tax: { tag: "latest" }
