# values-dev.yaml
domain: "yas.local.com"
envTag: "dev"
namespace: "yas-dev"
infraNamespace: "yas-dev"
repoURL: "https://github.com/BongLanTrungMuoi/Project-02.git"
targetRevision: main
observability:
  enabled: false
coreServices:
  - product
  - cart
  - order
  - customer
  - inventory
  - tax
  - media
  - search
  - sampledata
infra:
  postgresql:
    replicas: 1
    username: yasadminuser
    password: admin
  kafka:
    replicas: 1
  zookeeper:
    replicas: 1
  elasticsearch:
    replicas: 1
  redis:
    password: redis
    chartVersion: "20.6.1"
  akhq:
    chartVersion: "0.25.1"
  keycloak:
    bootstrapAdmin:
      username: admin
      password: admin
# Default image tags for dev
global:
  partOf: yas
  argocdNamespace: argocd
  project: default
  destinationServer: https://kubernetes.default.svc
  repoURL: https://github.com/BongLanTrungMuoi/Project-02.git
  targetRevision: main
  image:
    tag: "latest"
# Cấu hình riêng cho từng service nếu cần (để phục vụ developer_build)
services:
  yas-configuration: {tag: "latest"}
  backoffice-bff: {tag: "e93977b"}
  backoffice-ui: {tag: "latest"}
  storefront-bff: {tag: "e93977b"}
  storefront-ui: {tag: "latest"}
  swagger-ui: {tag: "latest"}
  cart: {tag: "latest"}
  customer: {tag: "latest"}
  inventory: {tag: "latest"}
  media: {tag: "latest"}
  order: {tag: "latest"}
  product: {tag: "latest"}
  search: {tag: "latest"}
  sampledata: {tag: "latest"}
  tax: {tag: "latest"}
