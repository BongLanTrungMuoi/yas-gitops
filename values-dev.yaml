# values-dev.yaml
domain: "yas.local.com"
envTag: "dev-13"
namespace: "yas-dev"
infraNamespace: "yas-13"
repoURL: "https://github.com/BongLanTrungMuoi/yas-CI-CD.git"
targetRevision: main
coreServices:
  - cart
  - customer
  - inventory
  - media
  - order
  - product
  - search
  - tax
# Default image tags for dev
global:
  image:
    tag: "latest"
