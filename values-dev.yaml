# values-dev.yaml
domain: "yas.local.com"
envTag: "dev-13"
namespace: "yas-dev"
infraNamespace: "yas-13"
repoURL: "https://github.com/BongLanTrungMuoi/Project-02.git"
targetRevision: main
coreServices:
  - product
  - cart
  - order
  - customer
  - inventory
  - tax
  - media
  - search

# Default image tags for dev
global:
  partOf: yas
  argocdNamespace: argocd
  project: default
  destinationServer: https://kubernetes.default.svc
  repoURL: https://github.com/BongLanTrungMuoi/Project-02.git
  targetRevision: main
  image:
    tag: "latest"

# Cấu hình riêng cho từng service nếu cần (để phục vụ developer_build)
services:
  yas-configuration: {tag: "latest"}
  backoffice-bff: {tag: "latest"}
  backoffice-ui: {tag: "latest"}
  storefront-bff: {tag: "latest"}
  storefront-ui: {tag: "latest"}
  swagger-ui: {tag: "latest"}
  cart: {tag: "latest"}
  customer: {tag: "latest"}
  inventory: {tag: "latest"}
  media: {tag: "latest"}
  order: {tag: "latest"}
  product: {tag: "latest"}
  search: {tag: "latest"}
  tax: {tag: "latest"}
