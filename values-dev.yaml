  storefront-bff: {tag: "209ae12"}
  storefront-ui: {tag: "latest"}
  swagger-ui: {tag: "latest"}
  cart: {tag: "latest"}
  customer: {tag: "209ae12"}
  inventory: {tag: "209ae12"}
  media: {tag: "c39e860"}
