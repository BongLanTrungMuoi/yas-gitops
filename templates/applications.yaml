# 7. Core Microservices
{{- range $service := $coreServices }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-%s" $service $envTag }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: {{ $repoURL }}
    targetRevision: {{ $targetRevision }}
    path: k8s-cd/charts/{{ $service }}
    helm:
      parameters:
        - name: backend.ingress.host
          value: {{ $apiHost }}
        - name: global.domain
          value: {{ $domain }}
        - name: global.envTag
          value: {{ $envTag }}
        - name: image.tag
          value: {{ index $.Values.services $service "tag" | default $.Values.global.image.tag }}
        # Core microservices thường nặng, cần thời gian khởi động lâu hơn
        - name: backend.readinessProbe.initialDelaySeconds
          value: "90"
        - name: backend.livenessProbe.initialDelaySeconds
          value: "120"
        - name: backend.readinessProbe.failureThreshold
          value: "10"
        - name: backend.livenessProbe.failureThreshold
          value: "10"
        # Kết nối hạ tầng sang namespace yas-13
        - name: backend.databaseConnectionUrl
          value: "jdbc:postgresql://postgresql.yas-13.svc.cluster.local:5432"
        # Cấu hình Kafka nếu cần
        - name: applicationConfig.spring.kafka.bootstrap-servers
          value: "kafka-cluster-kafka-bootstrap.yas-13.svc.cluster.local:9092"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: {{ $namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
{{- end }}
