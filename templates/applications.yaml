{{- $envTag := .Values.envTag -}}
{{- $domain := .Values.domain -}}
{{- $namespace := .Values.namespace -}}
{{- $repoURL := .Values.repoURL -}}
{{- $targetRevision := .Values.targetRevision -}}

{{- $backofficeHost := printf "backoffice-%s.%s" $envTag $domain -}}
{{- $storefrontHost := printf "storefront-%s.%s" $envTag $domain -}}
{{- $apiHost := printf "api-%s.%s" $envTag $domain -}}
{{- if not $envTag }}
  {{- $backofficeHost = printf "backoffice.%s" $domain -}}
  {{- $storefrontHost = printf "storefront.%s" $domain -}}
  {{- $apiHost = printf "api.%s" $domain -}}
{{- end }}

{{- $coreServices := list "cart" "customer" "inventory" "location" "media" "order" "payment" "product" "promotion" "rating" "search" "tax" "recommendation" "webhook" "sampledata" -}}

# --- Applications Definitions ---

# 1. yas-configuration
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "yas-configuration-%s" $envTag }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    repoURL: {{ $repoURL }}
    targetRevision: {{ $targetRevision }}
    path: k8s-cd/charts/yas-configuration
    helm:
      parameters:
        - name: global.domain
          value: {{ $domain }}
        - name: global.envTag
          value: {{ $envTag }}
        - name: image.tag
          value: {{ index .Values.services "yas-configuration" "tag" | default .Values.global.image.tag }}
        # Tối ưu cho Java Startup
        - name: readinessProbe.initialDelaySeconds
          value: "60"
        - name: livenessProbe.initialDelaySeconds
          value: "90"
        - name: readinessProbe.failureThreshold
          value: "10"
        - name: livenessProbe.failureThreshold
          value: "10"
        # Trỏ sang Keycloak ở namespace yas-13
        - name: applicationConfig.spring.security.oauth2.resourceserver.jwt.issuer-uri
          value: "http://keycloak-service.yas-13.svc.cluster.local:8080/realms/Yas"
        - name: applicationConfig.spring.lifecycle.timeout-per-shutdown-phase
          value: "30s"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: {{ $namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

# 2. backoffice-bff
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "backoffice-bff-%s" $envTag }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: {{ $repoURL }}
    targetRevision: {{ $targetRevision }}
    path: k8s-cd/charts/backoffice-bff
    helm:
      parameters:
        - name: backend.ingress.host
          value: {{ $backofficeHost }}
        - name: global.domain
          value: {{ $domain }}
        - name: global.envTag
          value: {{ $envTag }}
        - name: image.tag
          value: {{ index .Values.services "backoffice-bff" "tag" | default .Values.global.image.tag }}
        - name: backend.readinessProbe.initialDelaySeconds
          value: "90"
        - name: backend.livenessProbe.initialDelaySeconds
          value: "120"
        - name: backend.readinessProbe.failureThreshold
          value: "10"
        - name: backend.livenessProbe.failureThreshold
          value: "10"
        # Kết nối hạ tầng sang namespace yas-13
        - name: backend.databaseConnectionUrl
          value: "jdbc:postgresql://postgresql.yas-13.svc.cluster.local:5432"
        - name: backofficeBffExtraConfig.spring.data.redis.host
          value: "redis-master.yas-13.svc.cluster.local"
        - name: backofficeBffExtraConfig.spring.security.oauth2.client.provider.keycloak.issuer-uri
          value: "http://keycloak-service.yas-13.svc.cluster.local:8080/realms/Yas"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: {{ $namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

# 3. backoffice-ui
