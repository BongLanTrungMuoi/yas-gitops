  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: {{ $repoURL }}
    targetRevision: {{ $targetRevision }}
    path: k8s-cd/charts/backoffice-ui
    helm:
      parameters:
        - name: ingress.host
          value: {{ $backofficeHost }}
