{{- range $service := .Values.coreServices }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $service }}-{{ $nameTag }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ $project }}
  source:
    repoURL: {{ $repoURL }}
    targetRevision: {{ $targetRevision }}
    path: k8s-cd/charts/{{ $service }}
    helm:
      parameters:
        - name: backend.ingress.enabled
          value: "true"
        - name: backend.ingress.host
          value: {{ $apiHost }}
        - name: backend.ingress.path
          value: "/{{ $service }}"
        - name: global.domain
          value: {{ $domain }}
        - name: global.envTag
          value: {{ $envTag | quote }}
        - name: backend.image.tag
          value: {{ index $.Values.services $service "tag" | default $appImageTag | quote }}
        - name: backend.serviceMonitor.enabled
          value: {{ $.Values.observability.enabled | default false | quote }}
        - name: backend.databaseConnectionUrl
          value: "jdbc:postgresql://postgresql.{{ $infraNamespace }}.svc.cluster.local:5432"
        - name: applicationConfig.spring.kafka.bootstrap-servers
          value: "kafka-cluster-kafka-bootstrap.{{ $infraNamespace }}.svc.cluster.local:9092"
        - name: applicationConfig.spring.kafka.consumer.bootstrap-servers
          value: "kafka-cluster-kafka-bootstrap.{{ $infraNamespace }}.svc.cluster.local:9092"
        - name: searchApplicationConfig.elasticsearch.url
          value: "elasticsearch-es-http.{{ $infraNamespace }}.svc.cluster.local"
  destination:
    server: {{ $destinationServer | quote }}
    namespace: {{ $namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
{{- end }}
